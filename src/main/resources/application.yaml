spring:
  application:
    name: pinoRAG

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pinorag}
    username: ${SPRING_DATASOURCE_USERNAME:pinorag}
    password: ${SPRING_DATASOURCE_PASSWORD:pinorag}
    hikari:
      pool-name: pinorag-pool
      maximum-pool-size: 20
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  threads:
    virtual:
      enabled: true

  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:disabled}
    vectorstore:
      pinecone:
        api-key: ${PINECONE_API_KEY:disabled}
        environment: ${PINECONE_ENVIRONMENT:disabled}
        project-id: ${PINECONE_PROJECT_ID:disabled}
        index-name: ${PINECONE_INDEX:disabled}

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    io.pinoRAG: DEBUG

pinorag:
  vector:
    dimension: 1536
  auth:
    jwt:
      secret: ${PINORAG_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-32b}
      issuer: ${PINORAG_JWT_ISSUER:}
      allowed-clock-skew-seconds: 30
    rate-limit:
      requests-per-minute: 60
      burst: 60
