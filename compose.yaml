name: pinorag

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pinorag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pinorag}
      POSTGRES_USER: ${POSTGRES_USER:-pinorag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pinorag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pinorag-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: pinorag-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - pinorag-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pinorag:local
    container_name: pinorag-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pinorag}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-pinorag}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pinorag}
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      PINORAG_UPLOAD_DIR: /opt/pino/uploads
      PINORAG_JWT_SECRET: ${PINORAG_JWT_SECRET:-change-me-locally-change-me-locally-change-me-32b}
      PINORAG_EMBEDDER_ID: ${PINORAG_EMBEDDER_ID:-fake}
    volumes:
      - pinorag-uploads:/opt/pino/uploads
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  # compile-only
  mvn-compile:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - pinorag-m2-cache:/root/.m2
    command: >
      ./mvnw -B -ntp
      -DskipTests -Dmaven.test.skip=true
      compile
    profiles: ["tools"]

  # full verify: compile + test + package
  mvn-test:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /workspace
    # Mount Docker socket so Testcontainers can start Postgres/pgvector.
    volumes:
      - .:/workspace
      - pinorag-m2-cache:/root/.m2
      - /var/run/docker.sock:/var/run/docker.sock
    # Tell Testcontainers to use the host Docker socket, not Ryuk.
    environment:
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      DOCKER_HOST: unix:///var/run/docker.sock
    command: >
      ./mvnw -B -ntp -Dstyle.color=always verify
    profiles: ["tools"]

volumes:
  pinorag-postgres-data:
  pinorag-ollama-data:
  pinorag-uploads:
  pinorag-m2-cache:
