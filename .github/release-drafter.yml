name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels: [feature, enhancement]
  - title: 'Fixes'
    labels: [fix, bug]
  - title: 'Security'
    labels: [security]
  - title: 'Maintenance'
    labels: [chore, refactor, deps, docs, ci]

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [major, breaking]
  minor:
    labels: [minor, feature, enhancement]
  patch:
    labels: [patch, fix, bug, security, chore, deps, docs, ci, refactor]
  default: patch

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
