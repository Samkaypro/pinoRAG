name: Bug report
description: Something that should work doesn't.
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear, short description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal sequence to trigger it. Include the API call + payload if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pinoRAG version
      placeholder: v0.1.0 or git sha
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: Docker / JAR + Java 21 / Compose
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
